app = "alto"
primary_region = "sin"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"
  ALLOWED_ORIGINS = "https://alto.yoel.online,http://localhost:5173"

[deploy]
  release_command = "node dist/db/migrate.js && node dist/db/seed.js"

[processes]
  app = "node dist/index.js"
  worker = "node dist/worker.js"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 25
    hard_limit = 50

  [http_service.http_options]
    idle_timeout = 600
    response_header_timeout = 600

  [[http_service.checks]]
    grace_period = "30s"
    interval = "60s"
    method = "GET"
    timeout = "10s"
    path = "/health/live"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
