# fly.toml app configuration file generated for alto on 2026-06-02T17:14:21Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'alto'
primary_region = 'sin'

[build]

[deploy]
  release_command = 'node dist/db/migrate.js && node dist/db/seed.js'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
