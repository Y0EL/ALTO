  </g>

  <g transform="translate(600, 180)" text-anchor="middle" fill="#fafafa" font-family="-apple-system, BlinkMacSystemFont, 'Geist Sans', system-ui, sans-serif">
    <text y="-10" font-size="120" font-weight="700" letter-spacing="-6">ALTO</text>
    <text y="40" font-size="18" font-weight="400" fill="#a1a1aa" letter-spacing="0.5">Meeting transcripts, elegantly automated</text>
  </g>

  <g transform="translate(600, 308)" text-anchor="middle" fill="#52525b" font-family="-apple-system, BlinkMacSystemFont, 'Geist Sans', system-ui, sans-serif" font-size="11" letter-spacing="6">
