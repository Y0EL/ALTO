<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="ALTO banner">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0b"/>
      <stop offset="1" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="fadeMask" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.85" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <mask id="waveFade">
      <rect width="1200" height="360" fill="url(#fadeMask)"/>
    </mask>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" fill="url(#bgGrad)"/>
  <rect width="1200" height="360" fill="url(#dots)"/>

  <g mask="url(#waveFade)">
    <g transform="translate(0, 180)" fill="#fafafa" fill-opacity="0.85">
      <rect x="40"   y="-8"  width="3" height="16" rx="1.5"/>
      <rect x="60"   y="-22" width="3" height="44" rx="1.5"/>
      <rect x="80"   y="-14" width="3" height="28" rx="1.5"/>
      <rect x="100"  y="-32" width="3" height="64" rx="1.5"/>
      <rect x="120"  y="-18" width="3" height="36" rx="1.5"/>
      <rect x="140"  y="-46" width="3" height="92" rx="1.5"/>
      <rect x="160"  y="-26" width="3" height="52" rx="1.5"/>
      <rect x="180"  y="-58" width="3" height="116" rx="1.5"/>
      <rect x="200"  y="-30" width="3" height="60" rx="1.5"/>
      <rect x="220"  y="-72" width="3" height="144" rx="1.5"/>
      <rect x="240"  y="-50" width="3" height="100" rx="1.5"/>
      <rect x="260"  y="-90" width="3" height="180" rx="1.5"/>
      <rect x="280"  y="-60" width="3" height="120" rx="1.5"/>
      <rect x="300"  y="-100" width="3" height="200" rx="1.5"/>
      <rect x="320"  y="-70" width="3" height="140" rx="1.5"/>
      <rect x="340"  y="-110" width="3" height="220" rx="1.5"/>
      <rect x="360"  y="-80" width="3" height="160" rx="1.5"/>
      <rect x="860"  y="-80" width="3" height="160" rx="1.5"/>
      <rect x="880"  y="-110" width="3" height="220" rx="1.5"/>
      <rect x="900"  y="-70" width="3" height="140" rx="1.5"/>
      <rect x="920"  y="-100" width="3" height="200" rx="1.5"/>
      <rect x="940"  y="-60" width="3" height="120" rx="1.5"/>
      <rect x="960"  y="-90" width="3" height="180" rx="1.5"/>
      <rect x="980"  y="-50" width="3" height="100" rx="1.5"/>
      <rect x="1000" y="-72" width="3" height="144" rx="1.5"/>
      <rect x="1020" y="-30" width="3" height="60" rx="1.5"/>
      <rect x="1040" y="-58" width="3" height="116" rx="1.5"/>
      <rect x="1060" y="-26" width="3" height="52" rx="1.5"/>
      <rect x="1080" y="-46" width="3" height="92" rx="1.5"/>
      <rect x="1100" y="-18" width="3" height="36" rx="1.5"/>
      <rect x="1120" y="-32" width="3" height="64" rx="1.5"/>
